baseURL = "https://0xremyruiz.github.io/"
locale = "en"
title = "0xRemyRuiz"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = true
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 5

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  author = "0xRemyRuiz"
  description = "Personal core dump, used to illustrate my learning process and personal projects, and maybe more."
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowScrollToTop = false
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

[params.homeInfoParams]
  Title = "0xRemyRuiz"
  Content = "Cybersec, coding, electronics, research notes."

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/0xRemyRuiz"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/remy-ruiz/"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[menu]
  [[menu.main]]
    identifier = "writeups"
    name = "Writeups"
    url = "/writeups/"
    weight = 10
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 20
  [[menu.main]]
    identifier = "notes"
    name = "Notes"
    url = "/notes/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
